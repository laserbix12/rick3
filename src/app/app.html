<header class="header">
  <div class="logo">
    <svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#202329"/>
      <text x="50%" y="50%" fill="white" font-size="12" font-weight="bold" text-anchor="middle" dy=".3em">R&M</text>
    </svg>
  </div>
  <nav class="nav-links">
    <a href="#">Docs</a>
    <a href="#">About</a>
    <a href="#" class="btn-support">SUPPORT US</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-background"></div>
  <h1 class="hero-title">The Rick and Morty API</h1>
</section>

<main class="content">
  <div class="cards-grid">
    @for (character of characters; track character.id) {
      <article class="character-card">
        <div class="card-image">
          <img [src]="character.image" [alt]="character.name" />
        </div>
        <div class="card-content">
          <div class="section">
            <h2 class="name">{{ character.name }}</h2>
            <span class="status">
              <span class="status-icon" [ngClass]="{
                'alive': character.status === 'Alive',
                'dead': character.status === 'Dead',
                'unknown': character.status === 'unknown'
              }"></span>
              {{ character.status }} - {{ character.species }}
            </span>
          </div>

          <div class="section">
            <span class="text-gray">Last known location:</span>
            <a href="#" class="location-link">{{ character.location.name }}</a>
          </div>

          <div class="section">
            <span class="text-gray">First seen in:</span>
            <!-- La API solo devuelve la URL del episodio, así que mostramos un texto temporal o el nombre de la especie -->
            <a href="#" class="location-link">Chapter {{ character.episode[0].split('/').pop() }}</a>
          </div>
        </div>
      </article>
    }
  </div>
  <router-outlet></router-outlet>
</main>
