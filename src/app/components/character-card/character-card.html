<article class="character-card">
  <div class="card-image">
    <img [src]="character().image" [alt]="character().name" />
    <button class="favorite-btn" (click)="toggleFavorite($event)" [class.active]="isFavorite()" title="Toggle Favorite">
      @if (isFavorite()) {
        <svg viewBox="0 0 24 24" fill="#e53935" stroke="#e53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="rgba(0,0,0,0.5)" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      }
    </button>
  </div>
  <div class="card-content">
    <div class="section">
      <h2 class="name">{{ character().name }}</h2>
      <span class="status">
        <span class="status-icon" [ngClass]="{
          'alive': character().status === 'Alive',
          'dead': character().status === 'Dead',
          'unknown': character().status === 'unknown'
        }"></span>
        {{ character().status }} - {{ character().species }}
      </span>
    </div>

    <div class="section">
      <span class="text-gray">Last known location:</span>
      <a href="#" class="location-link">{{ character().location.name }}</a>
    </div>

    <div class="section">
      <span class="text-gray">First seen in:</span>
      <a href="#" class="location-link">Chapter {{ character().episode[0].split('/').pop() }}</a>
    </div>
  </div>
</article>
