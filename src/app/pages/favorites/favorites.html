<section class="hero-favorites">
  <h1 class="title">Mis Favoritos</h1>
  <p class="subtitle">Tus personajes guardados de múltiples dimensiones</p>
</section>

<main class="content">
  @if (favoritesService.favorites().length === 0) {
    <div class="empty-state">
      <h2>¡Aún no tienes favoritos!</h2>
      <p>Ve al inicio y añade algunos personajes a tus favoritos.</p>
    </div>
  } @else {
    <div class="cards-grid">
      @for (character of favoritesService.favorites(); track character.id) {
        <app-character-card [character]="character"></app-character-card>
      }
    </div>
  }
</main>
